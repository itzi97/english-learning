name: Generate Markdown from JSON

on:
  push:
    paths:
      - 'vocabulary.json'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate vocabulary.md
        run: python scripts/generate_vocabulary_md.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vocabulary.md
          git diff --staged --quiet || git commit -m "chore: regenerate vocabulary.md from JSON [skip ci]"
          git push
